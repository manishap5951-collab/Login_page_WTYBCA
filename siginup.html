<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            padding: 20px;
        }

        /* Card Container */
        .signup-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Form Styles */
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #444;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        /* Terms and Conditions Checkbox */
        .terms-container {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 14px;
            color: #555;
            margin-bottom: 24px;
            cursor: pointer;
            line-height: 1.3;
        }

        .terms-container input {
            margin-top: 2px;
        }

        .login-link a, .terms-container a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover, .terms-container a:hover {
            text-decoration: underline;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        /* Error message styling */
        .error-message {
            color: #de3545;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        /* Login Redirect */
        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        /* Simple entry animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>Get Started</h2>
        <p class="subtitle">Create your account to get full access</p>
        
        <form id="signupForm">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimum 8 characters" minlength="8" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
                <div id="passwordError" class="error-message">Passwords do not match</div>
            </div>
            
            <label class="terms-container">
                <input type="checkbox" id="terms" required>
                <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
            </label>
            
            <button type="submit" class="btn-submit">Create Account</button>
        </form>
        
        <p class="login-link">Already have an account? <a href="#">Sign in</a></p>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(event) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('passwordError');

            // Client-side password match validation
            if (password !== confirmPassword) {
                event.preventDefault(); // Stop form submission
                errorDiv.style.display = 'block';
                document.getElementById('confirmPassword').style.borderColor = '#de3545';
                return;
            } else {
                errorDiv.style.display = 'none';
                document.getElementById('confirmPassword').style.borderColor = '#ccc';
            }
            
            event.preventDefault(); 
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;

            console.log('Registration Attempt:', { fullName, email });
            alert(`Account successfully created for: ${fullName}`);
        });
    </script>

</body>
</html>
